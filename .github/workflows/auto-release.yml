name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Tag, release & build
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Get commits since last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          # Determine bump type
          BUMP="none"
          if echo "$COMMITS" | grep -qE '^feat!:|^fix!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:|^perf(\(.+\))?:'; then
            BUMP="patch"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits since $LATEST_TAG"
            exit 0
          fi

          # Calculate new version
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.bump != 'none'
        run: |
          TAG="${{ steps.bump.outputs.latest_tag }}"
          REPO="${{ github.repository }}"

          # Print one Markdown bullet per commit matching $TYPE_REGEX.
          # Format:  - <subject without prefix> ([short-sha](commit-url))
          #          <up to the first body paragraph, indented> (optional)
          format_section() {
            type_regex="$1"
            git log "${TAG}..HEAD" --reverse --pretty=format:'%H%x09%s%x09%b%x1e' |
              tr -d '\r' |
              awk -v type_re="^${type_regex}(\\([^)]*\\))?:" \
                  -v repo="$REPO" '
                BEGIN { RS = "\x1e"; FS = "\t" }
                {
                  sha=$1; subj=$2; body=$3
                  # Strip whitespace/newlines that creep in between records.
                  gsub(/^[ \t\n\r]+|[ \t\n\r]+$/, "", sha)
                  gsub(/^[ \t]+|[ \t]+$/, "", subj)
                  if (subj !~ type_re) next
                  short=substr(sha,1,7)
                  # Strip "type(scope): " prefix.
                  sub(type_re " *", "", subj)
                  # Auto-link bare "#NN" refs to PR/issue.
                  while (match(subj, /#[0-9]+/)) {
                    n = substr(subj, RSTART+1, RLENGTH-1)
                    subj = substr(subj,1,RSTART-1) "[#" n "](https://github.com/" repo "/issues/" n ")" substr(subj, RSTART+RLENGTH)
                  }
                  printf "- %s ([%s](https://github.com/%s/commit/%s))\n", subj, short, repo, sha

                  # Emit body lines, stopping at first blank line (lead
                  # paragraph only) — keeps squash-merge bodies from
                  # flooding the release notes with nested bullets.
                  n = split(body, lines, "\n")
                  printed = 0
                  for (i=1; i<=n; i++) {
                    L = lines[i]
                    gsub(/^[ \t]+|[ \t]+$/, "", L)
                    # Stop at first blank line after we have already printed
                    # at least one body line — that ends the lead paragraph.
                    if (L == "") { if (printed) break; else continue }
                    if (L ~ /^(Signed-off-by|Co-[Aa]uthored-[Bb]y|Reviewed-by|Reported-by|BREAKING CHANGE|Release-As):/) continue
                    # Skip nested squash bullets (e.g. "* fix: ...") and
                    # trailing horizontal rules from PR descriptions.
                    if (L ~ /^\*[ \t]+(feat|fix|chore|docs|ci|refactor|perf|test|build|style|revert)(\([^)]*\))?:/) continue
                    if (L ~ /^-{3,}$/) continue
                    printf "  %s\n", L
                    printed++
                    if (printed >= 6) break
                  }
                }
              '
          }

          {
            echo 'body<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ""

            FEATS=$(format_section "feat")
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(format_section "fix")
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            PERF=$(format_section "perf")
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF"
              echo ""
            fi

            OTHER=$(format_section "(refactor|ci)")
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${TAG}...${{ steps.bump.outputs.new_tag }}"
            echo ""
            echo "---"
            echo ""
            echo "### Download"
            echo ""
            echo "| File | OpenWrt version | Install command |"
            echo "|------|----------------|-----------------|"
            echo "| \`luci-app-trafficctl.ipk\` | 21.02 — 24.10 | \`opkg install <file>\` |"
            echo "| \`luci-app-trafficctl.apk\` | 25.12+ | \`apk add --allow-untrusted <file>\` |"
            echo ""
            echo "Stable URL (always points to the latest release):"
            echo "\`\`\`"
            echo "wget https://github.com/${{ github.repository }}/releases/latest/download/luci-app-trafficctl.ipk"
            echo "wget https://github.com/${{ github.repository }}/releases/latest/download/luci-app-trafficctl.apk"
            echo "\`\`\`"
            echo ""
            echo "Other filenames (\`_all.ipk\`, \`_noarch.apk\`, versioned) are the same file."
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update Makefile version and tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ steps.bump.outputs.new_version }}/" luci-app-trafficctl/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=1/" luci-app-trafficctl/Makefile
          git add luci-app-trafficctl/Makefile
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin main "${{ steps.bump.outputs.new_tag }}"

      - name: Build .ipk (standalone)
        if: steps.bump.outputs.bump != 'none'
        run: |
          ./build-ipk.sh "${{ steps.bump.outputs.new_version }}" 1
          ln -f dist/luci-app-trafficctl_*_all.ipk dist/luci-app-trafficctl_all.ipk
          ln -f dist/luci-app-trafficctl_*_all.ipk dist/luci-app-trafficctl.ipk
          cp dist/*.ipk /tmp/

      - name: Build .apk (via OpenWrt SDK, signed)
        if: steps.bump.outputs.bump != 'none'
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-25.12.4
          FEEDNAME: trafficctl
          PACKAGES: luci-app-trafficctl
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          V: sc
          KEY_BUILD: ${{ secrets.USIGN_PRIVATE_KEY }}

      - name: Collect APK
        if: steps.bump.outputs.bump != 'none'
        run: |
          mkdir -p dist
          cp /tmp/luci-app-trafficctl*.ipk dist/ 2>/dev/null || true
          APK=$(find bin/ -name "luci-app-trafficctl*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "dist/luci-app-trafficctl_${{ steps.bump.outputs.new_version }}-r1_noarch.apk"
            ln -f "dist/luci-app-trafficctl_${{ steps.bump.outputs.new_version }}-r1_noarch.apk" dist/luci-app-trafficctl_noarch.apk
            ln -f "dist/luci-app-trafficctl_${{ steps.bump.outputs.new_version }}-r1_noarch.apk" dist/luci-app-trafficctl.apk
          else
            echo "::error::APK not found in SDK output"
            find bin/ -type f -name "*.apk" || true
            exit 1
          fi

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*.ipk
            dist/*.apk

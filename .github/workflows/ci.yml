name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  shellcheck:
    uses: ./.github/workflows/shellcheck.yml

  eslint:
    uses: ./.github/workflows/eslint.yml

  test:
    uses: ./.github/workflows/tests.yml

  openwrt-rootfs:
    name: OpenWrt Rootfs Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test scripts in OpenWrt-like environment
        run: bash tests/test_openwrt_compat.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: root/usr/local/bin
          additional_files: root/etc/hotplug.d/iface/99-trafficctl-shapes root/usr/libexec/rpcd/trafficctl
        env:
          SHELLCHECK_OPTS: -x -e SC1091

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx eslint htdocs/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell unit tests
        run: sh tests/test_fw.sh
      - name: IPK build test
        run: sh tests/test_build_ipk.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: root/usr/local/bin
          additional_files: root/etc/hotplug.d/iface/99-trafficctl-shapes root/usr/libexec/rpcd/trafficctl root/etc/init.d/trafficctl-telegram
        env:
          SHELLCHECK_OPTS: -x -e SC1091

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: npx eslint htdocs/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shell unit tests
        run: bash tests/test_fw.sh
      - name: Telegram unit tests
        run: bash tests/test_telegram.sh
      - name: Security tests
        run: bash tests/test_security.sh
      - name: IPK build test
        run: bash tests/test_build_ipk.sh

  openwrt-rootfs:
    name: OpenWrt Rootfs Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Test scripts in OpenWrt-like environment
        run: bash tests/test_openwrt_compat.sh

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shell unit tests
        run: bash tests/test_fw.sh
      - name: Telegram unit tests
        run: bash tests/test_telegram.sh
      - name: Security tests
        run: bash tests/test_security.sh
      - name: IPK build test
        run: bash tests/test_build_ipk.sh

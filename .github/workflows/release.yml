name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload assets for (e.g. v1.2.1)'
        required: true

permissions:
  contents: write

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & upload assets
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build .ipk
        run: |
          ./build-ipk.sh "${{ steps.version.outputs.version }}" 1
          SRC=$(echo dist/luci-app-trafficctl_*_all.ipk)
          for name in luci-app-trafficctl_latest_all.ipk luci-app-trafficctl_all.ipk luci-app-trafficctl.ipk; do
            ln -f "$SRC" "dist/$name"
          done

      - name: Upload assets to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.ipk

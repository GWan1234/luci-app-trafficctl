name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build .ipk
        run: |
          ./build-ipk.sh "${{ steps.version.outputs.version }}" 1
          SRC=$(echo dist/luci-app-trafficctl_*_all.ipk)
          for name in luci-app-trafficctl_latest_all.ipk luci-app-trafficctl_all.ipk luci-app-trafficctl.ipk; do
            ln -f "$SRC" "dist/$name"
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.ipk
          generate_release_notes: true

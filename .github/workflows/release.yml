name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .ipk
        run: ./build-ipk.sh "${{ steps.version.outputs.version }}" 1

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.ipk
          generate_release_notes: true
